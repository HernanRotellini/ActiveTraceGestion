# =============================================================================
# activia-trace — Orquestación local
# =============================================================================
# Servicios:
#   api      → FastAPI (uvicorn)
#   postgres → Base de datos PostgreSQL 16
#   worker   → Worker de background (misma imagen que api, distinto comando)
# =============================================================================

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://trace:trace@postgres:5432/trace}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production!!}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-dev-32-char-encryption-key-here!}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-activia-trace}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trace
      POSTGRES_PASSWORD: trace
      POSTGRES_DB: trace
    ports:
      - "5434:5432"
    volumes:
      - trace_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trace -d trace"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python", "-m", "app.workers.main"]
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://trace:trace@postgres:5432/trace}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production!!}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-dev-32-char-encryption-key-here!}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-activia-trace}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  trace_pgdata:
    driver: local
